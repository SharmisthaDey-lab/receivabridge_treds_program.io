<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReceivaBridge — Prototype</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .animate-in { animation: fadeIn 500ms ease-out both; }
    @keyframes fadeInFast { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }
    .animate-in-fast { animation: fadeInFast 240ms ease-out both; }
    @keyframes scaleIn { 0% { transform: scale(0.4); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    .animate-scale-in { animation: scaleIn 600ms cubic-bezier(.2,.8,.3,1.4) both; }
    @keyframes pulseDot { 0%, 100% { transform: scale(1); opacity: 0.6; } 50% { transform: scale(1.4); opacity: 1; } }
    .animate-pulse-dot { animation: pulseDot 1.2s ease-in-out infinite; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .animate-slide-in-right { animation: slideInRight 280ms cubic-bezier(.2,.8,.3,1) both; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin 1.4s linear infinite; }
    /* OCR scanline */
    @keyframes scanLine { 0% { top: 0; opacity: 1; } 50% { opacity: 1; } 100% { top: calc(100% - 2px); opacity: 0.6; } }
    .ocr-scanline { animation: scanLine 1.6s ease-in-out infinite alternate; }
    /* Shield pulse */
    @keyframes shieldGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(30, 93, 63, 0.18); } 50% { box-shadow: 0 0 0 14px rgba(30, 93, 63, 0); } }
    .animate-shield-glow { animation: shieldGlow 1.6s ease-in-out infinite; }
    /* Toggle */
    .toggle-knob { transition: transform 220ms cubic-bezier(.2,.8,.3,1); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // --- Inline icons ---
    const Icon = ({ size = 24, className = '', children, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
           fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
           className={className} {...props}>{children}</svg>
    );
    const ShieldCheck = (p) => <Icon {...p}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></Icon>;
    const Plus = (p) => <Icon {...p}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
    const Terminal = (p) => <Icon {...p}><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
    const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></Icon>;
    const ChevronDown = (p) => <Icon {...p}><path d="m6 9 6 6 6-6"/></Icon>;
    const ChevronUp = (p) => <Icon {...p}><path d="m18 15-6-6-6 6"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><path d="m15 18-6-6 6-6"/></Icon>;
    const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
    const Briefcase = (p) => <Icon {...p}><rect width="20" height="14" x="2" y="6" rx="2"/><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></Icon>;
    const Building2 = (p) => <Icon {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></Icon>;
    const Landmark = (p) => <Icon {...p}><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/></Icon>;
    const LogOut = (p) => <Icon {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></Icon>;
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></Icon>;
    const FileSpreadsheet = (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></Icon>;
    const Database = (p) => <Icon {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></Icon>;
    const Cpu = (p) => <Icon {...p}><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></Icon>;
    const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3z"/></Icon>;
    const Lock = (p) => <Icon {...p}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const PenTool = (p) => <Icon {...p}><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></Icon>;
    const BadgeCheck = (p) => <Icon {...p}><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></Icon>;
    const Boxes = (p) => <Icon {...p}><path d="M2.97 12.92A2 2 0 0 0 2 14.63v3.24a2 2 0 0 0 .97 1.71l3 1.8a2 2 0 0 0 2.06 0L12 19v-5l-5-3-4.03 1.92Z"/><path d="m7 16.5-4.74-2.85"/><path d="m7 16.5 5-3"/><path d="M7 16.5v5.17"/><path d="M12 19v-5l5-3 4.03 1.92a2 2 0 0 1 .97 1.71v3.24a2 2 0 0 1-.97 1.71l-3 1.8a2 2 0 0 1-2.06 0L12 19Z"/></Icon>;
    const Hash = (p) => <Icon {...p}><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></Icon>;
    const Award = (p) => <Icon {...p}><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></Icon>;

    // --- Brand mark ---
    const Logo = ({ size = 26 }) => (
      <div className="flex items-center gap-2.5">
        <svg width={size} height={size} viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="5" fill="#1A1918"/>
          <path d="M5.5 16.5C5.5 11.8 9.3 9 14 9C18.7 9 22.5 11.8 22.5 16.5" stroke="#FDFCFB" strokeWidth="1.6" strokeLinecap="round" fill="none"/>
          <line x1="4.5" y1="19" x2="23.5" y2="19" stroke="#FDFCFB" strokeWidth="1.6" strokeLinecap="round"/>
          <line x1="8.5" y1="19" x2="8.5" y2="16" stroke="#FDFCFB" strokeWidth="1.4" strokeLinecap="round"/>
          <line x1="19.5" y1="19" x2="19.5" y2="16" stroke="#FDFCFB" strokeWidth="1.4" strokeLinecap="round"/>
        </svg>
        <span className="font-bold tracking-tighter text-lg text-[#1A1918]">ReceivaBridge</span>
      </div>
    );

    // --- Constants ---
    const ROLES = {
      SELLER: 'Seller (MSME)', BUYER: 'Buyer (Corporate)',
      FINANCIER: 'Financier (Bank)', INSURANCE: 'Insurance Co'
    };
    const PERSONAS = [
      { id: 'SELLER', role: ROLES.SELLER, label: 'Seller', sub: 'MSME / Vendor', desc: 'Discount approved invoices for early liquidity.', Icon: Briefcase },
      { id: 'BUYER', role: ROLES.BUYER, label: 'Buyer', sub: 'Corporate', desc: 'Approve invoices raised by your suppliers.', Icon: Building2 },
      { id: 'FINANCIER', role: ROLES.FINANCIER, label: 'Financier', sub: 'Bank / NBFC', desc: 'Bid on factoring units in live auction.', Icon: Landmark },
      { id: 'INSURANCE', role: ROLES.INSURANCE, label: 'Insurance', sub: 'Credit insurer', desc: 'Underwrite credit cover for transactions.', Icon: ShieldCheck },
    ];
    const BANK_PARTNERS = [
      { id: 'HDFC', name: 'HDFC Bank', desc: 'Savings · KYC verified' },
      { id: 'ICICI', name: 'ICICI Bank', desc: 'Current · KYC verified' },
      { id: 'SBI', name: 'State Bank of India', desc: 'Current · KYC verified' },
      { id: 'AXIS', name: 'Axis Bank', desc: 'Savings · KYC verified' }
    ];
    const INITIAL_INVOICES = [
      { id: 'INV-001', amount: 500000, buyer: 'Tata Motors', seller: 'MicroGear Ltd',
        status: 'In Auction', date: '2026-05-01', insuranceCover: null,
        bids: [
          { id: 'BID-001-A', bank: 'Standard Chartered', rate: 7.5, validHours: 4, tenor: 90 },
          { id: 'BID-001-B', bank: 'HDFC Bank', rate: 7.6, validHours: 6, tenor: 90 },
          { id: 'BID-001-C', bank: 'State Bank of India', rate: 7.8, validHours: 2, tenor: 90 },
        ], acceptedBid: null, settlementAdvice: null },
      { id: 'INV-002', amount: 1200000, buyer: 'Reliance Ind', seller: 'BrightSteel',
        status: 'Pending Buyer Approval', date: '2026-05-05', insuranceCover: null,
        bids: [], acceptedBid: null, settlementAdvice: null },
      { id: 'INV-003', amount: 250000, buyer: 'HUL', seller: 'AgroPack',
        status: 'Financed', date: '2026-04-20', insuranceCover: 100,
        bids: [], acceptedBid: { id: 'BID-003-LEGACY', bank: 'ICICI Bank', rate: 7.2, tenor: 90 },
        settlementAdvice: { id: 'SA-INV-003-20260421', financier: 'ICICI Bank', rate: 7.2, tenor: 90, fee: 4438, net: 245562, settlementDate: '2026-04-21' } }
    ];
    const BANK_POOL = ['State Bank of India', 'HDFC Bank', 'ICICI Bank', 'Axis Bank', 'Kotak Mahindra', 'Yes Bank', 'IndusInd Bank', 'Standard Chartered'];

    const MOCK_BUYERS = [
      { name: 'Tata Motors Ltd', gstin: '27AAACT2727Q1ZS', commodity: 'Automotive components' },
      { name: 'Reliance Industries', gstin: '24AAACR5055K1Z7', commodity: 'Industrial polymers' },
      { name: 'Hindustan Unilever', gstin: '27AAACH1936K1ZW', commodity: 'Packaged consumables' },
      { name: 'Mahindra & Mahindra', gstin: '27AAACM6321P1ZN', commodity: 'Tractor sub-assembly' },
      { name: 'L&T Construction', gstin: '27AAACL0140P2ZP', commodity: 'Structural steel' }
    ];

    // --- Utilities ---
    const formatLiquidity = (n) => {
      if (!n || n <= 0) return '₹0';
      if (n >= 1e7) return '₹' + (n / 1e7).toFixed(2) + ' Cr';
      if (n >= 1e5) return '₹' + (n / 1e5).toFixed(2) + ' L';
      return '₹' + Math.round(n).toLocaleString('en-IN');
    };
    const formatINR = (n) => '₹' + Math.round(n).toLocaleString('en-IN');
    const computeFee = (a, r, t = 90) => a * (r / 100) * (t / 365);
    const generateBids = (id) => {
      const banks = [...BANK_POOL].sort(() => Math.random() - 0.5).slice(0, 3 + Math.floor(Math.random() * 2));
      return banks.map((bank, idx) => ({
        id: `BID-${id}-${String.fromCharCode(65 + idx)}`,
        bank, rate: +(7.2 + Math.random() * 1.4).toFixed(2),
        validHours: 1 + Math.floor(Math.random() * 8), tenor: 90
      }));
    };
    const generateTredsId = () => 'RB-FU-' + new Date().getFullYear() + '-' + String(Math.floor(Math.random() * 90000) + 10000);
    const randomAmount = () => {
      const bases = [250000, 380000, 750000, 1200000, 480000, 920000, 600000];
      return bases[Math.floor(Math.random() * bases.length)];
    };

    // --- Sub-Components ---
    const StatCard = ({ title, value, subtext, accent }) => (
      <div className="bg-[#FDFCFB] border border-[#EAE6E1] p-5 rounded-sm shadow-sm">
        <p className="text-xs font-medium text-[#6B665F] uppercase tracking-wider mb-1">{title}</p>
        <p className={`text-2xl font-semibold ${accent ? 'text-[#1E5D3F]' : 'text-[#1A1918]'}`}>{value}</p>
        <p className="text-xs text-[#928D86] mt-1">{subtext}</p>
      </div>
    );

    const ApiLogDrawer = ({ logs, isOpen, setIsOpen }) => (
      <div className={`fixed bottom-0 left-0 right-0 transition-all duration-300 ease-in-out z-40 ${isOpen ? 'h-64' : 'h-10'}`}>
        <button onClick={() => setIsOpen(!isOpen)} className="w-full h-10 bg-[#1A1918] text-[#FDFCFB] flex items-center justify-between px-6 text-xs font-mono">
          <span className="flex items-center gap-2"><Terminal size={14} /> SYSTEM API LOGS (RB_GATEWAY_V1)</span>
          {isOpen ? <ChevronDown size={14} /> : <ChevronUp size={14} />}
        </button>
        <div className="bg-[#1A1918] h-full overflow-y-auto p-4 border-t border-[#33312E]">
          {logs.length === 0 && <p className="text-[11px] font-mono text-[#928D86]">// no events yet</p>}
          {logs.map((log, i) => (
            <div key={i} className="mb-3 font-mono text-[11px] border-l-2 border-[#D4CFC7] pl-3">
              <span className="text-[#928D86]">[{log.timestamp}]</span>{' '}
              <span className="text-[#E6B325]">{log.method}</span>{' '}
              <span className="text-[#FDFCFB]">{log.endpoint}</span>
              <pre className="text-[#A8A39D] mt-1 overflow-x-auto">{JSON.stringify(log.payload, null, 2)}</pre>
            </div>
          ))}
        </div>
      </div>
    );

    const ToastContainer = ({ toasts }) => (
      <div className="fixed top-20 right-6 z-[100] flex flex-col gap-2 pointer-events-none w-80">
        {toasts.map(t => (
          <div key={t.id} className="bg-[#1A1918] text-[#FDFCFB] px-4 py-3 rounded-sm shadow-lg flex items-start gap-3 animate-slide-in-right pointer-events-auto">
            <CheckCircle2 size={16} className="text-[#7CB97C] mt-0.5 flex-shrink-0" />
            <div className="flex-1">
              <p className="text-xs font-semibold leading-tight">{t.title}</p>
              {t.detail && <p className="text-[10px] text-[#A8A39D] mt-0.5">{t.detail}</p>}
            </div>
          </div>
        ))}
      </div>
    );

    // --- OTP Input ---
    const OtpInput = ({ value, onChange, onComplete }) => {
      const refs = useRef([]);
      const handleChange = (i, raw) => {
        const ch = raw.replace(/\D/g, '').slice(-1);
        let rebuilt = '';
        for (let k = 0; k < 6; k++) rebuilt += (k === i ? (ch || '') : (value[k] || ''));
        rebuilt = rebuilt.slice(0, 6);
        onChange(rebuilt);
        if (ch && i < 5) refs.current[i + 1]?.focus();
        if (rebuilt.length === 6) onComplete?.(rebuilt);
      };
      const handleKey = (i, e) => { if (e.key === 'Backspace' && !(value[i] || '') && i > 0) refs.current[i - 1]?.focus(); };
      return (
        <div className="flex gap-2 justify-center">
          {[0, 1, 2, 3, 4, 5].map(i => (
            <input key={i} ref={el => refs.current[i] = el} type="text" inputMode="numeric" maxLength={1}
              value={value[i] || ''} onChange={e => handleChange(i, e.target.value)} onKeyDown={e => handleKey(i, e)}
              className="w-11 h-12 text-center text-lg font-semibold tabular-nums bg-transparent border border-[#EAE6E1] rounded-sm focus:outline-none focus:border-[#1A1918] focus:bg-[#FBFAF7] transition-colors" />
          ))}
        </div>
      );
    };

    // --- Landing / Auth Gateway ---
    const LandingPage = ({ onAuth, addLog }) => {
      const [authMode, setAuthMode] = useState('login');
      const [selectedPersona, setSelectedPersona] = useState(null);
      const [email, setEmail] = useState('');
      const [step, setStep] = useState('select');
      const [otp, setOtp] = useState('');
      const [otpStatus, setOtpStatus] = useState('idle');
      const canProceed = selectedPersona && email.trim().length > 3 && email.includes('@');

      const handlePrimary = () => {
        if (!canProceed) return;
        const persona = PERSONAS.find(p => p.id === selectedPersona);
        if (authMode === 'register') {
          addLog('POST', '/api/v1/auth/register', { persona: persona.id, role: persona.role, email });
          onAuth({ persona, email, mode: 'register' });
          return;
        }
        addLog('POST', '/api/v1/auth/login', { persona: persona.id, role: persona.role, email });
        addLog('POST', '/api/v1/auth/otp/send', { email, channel: 'email', expires_in: 300 });
        setStep('otp');
      };

      const handleVerify = (code) => {
        const c = code || otp;
        if (c.length !== 6) return;
        setOtpStatus('verifying');
        addLog('POST', '/api/v1/auth/otp/verify', { email, code: c });
        setTimeout(() => {
          const persona = PERSONAS.find(p => p.id === selectedPersona);
          onAuth({ persona, email, mode: 'login' });
        }, 700);
      };

      if (step === 'otp') {
        return (
          <div className="min-h-screen bg-[#F7F5F2] flex items-center justify-center p-6 pb-24">
            <div className="w-full max-w-md animate-in">
              <div className="mb-8 flex justify-center"><Logo size={28} /></div>
              <div className="bg-[#FDFCFB] border border-[#EAE6E1] rounded-sm p-8 shadow-sm">
                <button onClick={() => { setStep('select'); setOtp(''); setOtpStatus('idle'); }}
                  className="flex items-center gap-1 text-[10px] uppercase tracking-widest text-[#928D86] hover:text-[#1A1918] mb-6"><ChevronLeft size={12} /> Back</button>
                <div className="text-center mb-7">
                  <div className="w-12 h-12 rounded-full bg-[#F2EFEA] mx-auto mb-3 flex items-center justify-center"><Lock size={20} className="text-[#1A1918]" /></div>
                  <h1 className="text-xl font-light tracking-tight text-[#1A1918]">Secondary check</h1>
                  <p className="text-xs text-[#6B665F] mt-2">We sent a 6-digit code to <span className="font-semibold text-[#1A1918]">{email}</span></p>
                </div>
                <OtpInput value={otp} onChange={setOtp} onComplete={handleVerify} />
                <button onClick={() => handleVerify()} disabled={otp.length !== 6 || otpStatus === 'verifying'}
                  className={`w-full mt-6 py-3 text-sm font-medium transition-colors ${otp.length === 6 && otpStatus !== 'verifying' ? 'bg-[#1A1918] text-white hover:bg-black' : 'bg-[#EAE6E1] text-[#928D86] cursor-not-allowed'}`}>
                  {otpStatus === 'verifying' ? 'Verifying…' : 'Verify & Continue'}
                </button>
                <p className="text-[11px] text-center text-[#928D86] mt-4">Didn't receive a code?{' '}
                  <button onClick={() => addLog('POST', '/api/v1/auth/otp/send', { email, channel: 'email', resend: true })} className="text-[#1A1918] font-medium underline underline-offset-2">Resend</button>
                </p>
                <div className="mt-6 pt-6 border-t border-[#EAE6E1] text-center">
                  <p className="text-[10px] uppercase tracking-[0.18em] text-[#928D86]">Multi-level credentials</p>
                  <p className="text-[10px] text-[#928D86] mt-1">Tip: any 6 digits work in this prototype.</p>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-[#F7F5F2] flex items-center justify-center p-6 pb-24">
          <div className="w-full max-w-2xl animate-in">
            <div className="mb-8 flex justify-center"><Logo size={28} /></div>

    // --- KYC-Light Wizard (unchanged) ---
    const KycLightWizard = ({ onComplete, addLog, showToast, userEmail, onTriggerUpload }) => {

              {udyamStatus === 'verifying' && <div className="flex items-center justify-center gap-3 py-4 text-[#6B665F]"><div className="w-4 h-4 border-2 border-[#D4CFC7] border-t-[#1A1918] rounded-full animate-spin-slow" /><p className="text-xs font-medium">Querying MSME portal…</p></div>}
              {udyamStatus === 'verified' && udyamData && (

              {udyamStatus !== 'verified' ? (

              )}

          {step === 2 && (

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                {BANK_PARTNERS.map(b => {

                      <p className={`text-[10px] uppercase tracking-widest ${isSel ? 'text-[#A8A39D]' : 'text-[#928D86]'}`}>{b.desc}</p>
                    </button>

              </div>
              {bankStatus === 'syncing' && <div className="flex items-center justify-center gap-3 py-4 text-[#6B665F]"><div className="w-4 h-4 border-2 border-[#D4CFC7] border-t-[#1A1918] rounded-full animate-spin-slow" /><p className="text-xs font-medium">Pulling KYC profile from {selectedBank?.name}…</p></div>}
              {bankStatus === 'synced' && bankData && (
                <div className="bg-[#FBFAF7] border border-[#EAE6E1] rounded-sm p-4 animate-in-fast">
                  <div className="flex items-center gap-2 mb-3"><CheckCircle2 size={16} className="text-[#1E5D3F]" /><p className="text-[10px] uppercase tracking-widest text-[#1E5D3F] font-bold">KYC Synced</p></div>
                  <div className="grid grid-cols-2 gap-y-3 gap-x-6 text-xs">

                <button onClick={() => setStep(3)} className="w-full py-3 text-sm font-medium bg-[#1A1918] text-white hover:bg-black transition-colors flex items-center justify-center gap-2">Continue to Master Agreement <ChevronRight size={14} /></button>

          {step === 3 && (
            <div className="space-y-5 animate-in-fast">

              <div className="bg-[#FBFAF7] border border-[#EAE6E1] rounded-sm p-4 max-h-40 overflow-y-auto text-[11px] text-[#6B665F] leading-relaxed">

              </div>
              <div className="space-y-3">
                {[
                  { key: 'agree1', checked: agree1, setter: setAgree1, label: 'Declaration', text: 'I confirm the underlying goods or services represented by my invoices are not pledged, hypothecated, or otherwise charged to my working capital banker.' },
                  { key: 'agree2', checked: agree2, setter: setAgree2, label: 'Legal', text: "I agree to the 'No Recourse' and 'No Set-off' provisions of the Master Agreement." },

                    <button type="button" onClick={() => item.setter(!item.checked)}
                      className={`mt-0.5 w-4 h-4 flex-shrink-0 border rounded-sm flex items-center justify-center transition-all ${item.checked ? 'bg-[#1A1918] border-[#1A1918]' : 'border-[#D4CFC7] bg-white'}`}>

    };

    // --- Toggle ---
    const Toggle = ({ checked, onChange }) => (
      <button type="button" role="switch" aria-checked={checked} onClick={() => onChange(!checked)}
        className={`relative w-11 h-6 rounded-full transition-colors flex-shrink-0 ${checked ? 'bg-[#1A1918]' : 'bg-[#D4CFC7]'}`}>
        <span className={`toggle-knob block w-4 h-4 rounded-full bg-white absolute top-1`} style={{ left: checked ? '24px' : '4px' }} />
      </button>
    );

    // --- AI-extracted field ---
    const AiField = ({ label, value, onChange, mono, suffix, type = 'text' }) => (
      <div>
        <div className="flex items-center justify-between mb-1">
          <label className="text-[10px] uppercase tracking-[0.16em] text-[#928D86] font-semibold">{label}</label>
          <span className="text-[8px] font-bold uppercase tracking-widest text-[#7A6A1E] bg-[#F2EDD5] px-1.5 py-0.5 rounded-sm flex items-center gap-0.5">
            <Sparkles size={8} /> AI
          </span>
        </div>
        <div className="relative">
          <input type={type} value={value} onChange={e => onChange(e.target.value)}
            className={`w-full p-2.5 bg-[#FBF6EA] border border-[#E8DEC2] text-sm font-medium focus:outline-none focus:border-[#1A1918] focus:bg-[#FDFCFB] transition-colors ${mono ? 'font-mono' : ''} ${suffix ? 'pr-12' : ''}`} />
          {suffix && <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-[#928D86] font-semibold">{suffix}</span>}
        </div>
      </div>
    );

    // --- Smart Upload Modal (Omni-channel + AI + GSTN + FU) ---
    const UploadInvoiceModal = ({ open, onClose, onUpload, addLog, showToast }) => {
      // stage: channel | file_idle | ocr | review | gstn | fu_card | creating | done
      //        | bulk_idle | bulk_processing | bulk_done
      //        | erp_idle | erp_syncing | erp_done
      const [stage, setStage] = useState('channel');
      const [channel, setChannel] = useState('file'); // file | bulk | erp

      // File channel state
      const [file, setFile] = useState(null);
      const [dragOver, setDragOver] = useState(false);
      const fileInputRef = useRef(null);
      const [ocrProgress, setOcrProgress] = useState(0);
      const ocrDone = useRef(false);

      // Extracted (AI) data
      const [ext, setExt] = useState(null); // { invoiceNumber, invoiceDate, amount, buyer, commodity, gstin, hsn }

      // GSTN
      const [gstnVerified, setGstnVerified] = useState(false);

      // FU generation
      const [fuData, setFuData] = useState(null);
      const [declaration, setDeclaration] = useState(false);

      // Bulk
      const [bulkFile, setBulkFile] = useState(null);
      const [bulkCount, setBulkCount] = useState(0);
      const [bulkResults, setBulkResults] = useState(null);

      // ERP
      const [erpSystem, setErpSystem] = useState(null); // 'tally' | 'sap'
      const [erpToggle, setErpToggle] = useState(false);
      const [erpResults, setErpResults] = useState(null);

      const reset = () => {
        setStage('channel'); setChannel('file');
        setFile(null); setDragOver(false); setOcrProgress(0); ocrDone.current = false;
        setExt(null); setGstnVerified(false); setFuData(null); setDeclaration(false);
        setBulkFile(null); setBulkCount(0); setBulkResults(null);
        setErpSystem(null); setErpToggle(false); setErpResults(null);
      };
      const close = () => { reset(); onClose(); };

      // -- OCR progress driver
      useEffect(() => {
        if (stage !== 'ocr') return;
        const i = setInterval(() => setOcrProgress(p => Math.min(100, p + 4 + Math.random() * 4)), 70);
        return () => clearInterval(i);
      }, [stage]);

      // OCR completion → generate mock AI-extracted data and move to review
      useEffect(() => {
        if (stage === 'ocr' && ocrProgress >= 100 && !ocrDone.current) {
          ocrDone.current = true;
          const buyer = MOCK_BUYERS[Math.floor(Math.random() * MOCK_BUYERS.length)];
          const data = {
            invoiceNumber: 'INV-2026-' + String(Math.floor(Math.random() * 9000) + 1000),
            invoiceDate: new Date().toISOString().split('T')[0],
            amount: String(randomAmount()),
            buyer: buyer.name,
            commodity: buyer.commodity,
            gstin: buyer.gstin,
            hsn: '8708'
          };
          setExt(data);
          addLog('POST', '/api/v1/ocr/extract', {
            file_name: file?.name || 'invoice.pdf',
            extracted: { invoice_number: data.invoiceNumber, amount: parseInt(data.amount), buyer: data.buyer, commodity: data.commodity, gstin: data.gstin },
            confidence: 0.96
          });
          showToast({ title: 'OCR complete', detail: 'AI extracted 7 fields. Please review.' });
          setTimeout(() => setStage('review'), 300);
        }
      }, [ocrProgress, stage]);

      const startFileChannel = () => { setChannel('file'); setStage('file_idle'); };
      const startBulkChannel = () => { setChannel('bulk'); setStage('bulk_idle'); };
      const startErpChannel = () => { setChannel('erp'); setStage('erp_idle'); };

      const beginOcr = () => {
        if (!file && !confirm) return;
        setOcrProgress(0); ocrDone.current = false; setStage('ocr');
      };

      const handleDrop = (e) => {
        e.preventDefault(); setDragOver(false);
        if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
      };

      const startGstn = () => {
        if (!ext) return;
        setStage('gstn');
        addLog('GET', '/api/v1/gstn/validate-einvoice', {
          gstin: ext.gstin, invoice_number: ext.invoiceNumber, invoice_date: ext.invoiceDate, amount: parseInt(ext.amount)
        });
        setTimeout(() => {
          setGstnVerified(true);
          const fu = {
            tredsId: generateTredsId(),
            tenor: 90,
            balanceTenor: 90,
            issueDate: new Date().toISOString().split('T')[0]
          };
          setFuData(fu);
          showToast({ title: 'GSTN: Genuine', detail: 'Invoice authenticated against e-invoice registry.' });
          setTimeout(() => setStage('fu_card'), 350);
        }, 1500);
      };

      const submitFU = () => {
        if (!declaration || !ext || !fuData) return;
        setStage('creating');
        const newInvoice = {
          id: fuData.tredsId,
          amount: parseInt(ext.amount) || 0,
          buyer: ext.buyer,
          seller: 'My Company',
          status: 'Pending Buyer Approval',
          date: ext.invoiceDate,
          insuranceCover: null,
          bids: [], acceptedBid: null, settlementAdvice: null,
          // FU metadata
          tredsId: fuData.tredsId,
          tenor: fuData.tenor,
          balanceTenor: fuData.balanceTenor,
          issueDate: fuData.issueDate,
          commodity: ext.commodity,
          gstin: ext.gstin,
          gstnVerified: true,
          aiExtracted: true,
          invoiceNumber: ext.invoiceNumber
        };
        addLog('POST', '/api/v1/factoring-units/create', {
          treds_id: fuData.tredsId, invoice_number: ext.invoiceNumber, amount: parseInt(ext.amount),
          buyer: ext.buyer, commodity: ext.commodity, gstin: ext.gstin,
          tenor_days: fuData.tenor, issue_date: fuData.issueDate,
          declarations: { negative_lien: true, gstn_verified: true, ai_extracted: true }
        });
        setTimeout(() => {
          onUpload(newInvoice);
          showToast({ title: 'Factoring Unit created', detail: `${fuData.tredsId} · awaiting buyer approval` });
          setStage('done');
        }, 900);
      };

      const runBulkUpload = () => {
        if (!bulkFile) return;
        setStage('bulk_processing');
        const count = 6 + Math.floor(Math.random() * 8);
        setBulkCount(count);
        addLog('POST', '/api/v1/invoices/bulk-upload', { file_name: bulkFile.name, file_size_kb: Math.round(bulkFile.size / 1024), estimated_rows: count });
        setTimeout(() => {
          const rows = Array.from({ length: count }).map(() => {
            const b = MOCK_BUYERS[Math.floor(Math.random() * MOCK_BUYERS.length)];
            return { tredsId: generateTredsId(), buyer: b.name, amount: randomAmount() };
          });
          setBulkResults(rows);
          addLog('POST', '/api/v1/factoring-units/create', { batch: true, count, source: 'bulk-csv' });
          setStage('bulk_done');
        }, 1400);
      };

      const finalizeBulk = () => {
        bulkResults.forEach(r => {
          onUpload({
            id: r.tredsId, amount: r.amount, buyer: r.buyer, seller: 'My Company',
            status: 'Pending Buyer Approval', date: new Date().toISOString().split('T')[0],
            insuranceCover: null, bids: [], acceptedBid: null, settlementAdvice: null,
            tredsId: r.tredsId, tenor: 90, balanceTenor: 90,
            issueDate: new Date().toISOString().split('T')[0], gstnVerified: true, aiExtracted: true
          });
        });
        showToast({ title: `${bulkResults.length} FUs created`, detail: 'All via bulk CSV intake.' });
        close();
      };

      const runErpSync = () => {
        if (!erpSystem || !erpToggle) return;
        setStage('erp_syncing');
        addLog('POST', `/api/v1/erp/${erpSystem}/sync`, { mode: 'live_pull', auth: 'oauth2', tenant: 'demo' });
        setTimeout(() => {
          const count = 3 + Math.floor(Math.random() * 5);
          const rows = Array.from({ length: count }).map(() => {
            const b = MOCK_BUYERS[Math.floor(Math.random() * MOCK_BUYERS.length)];
            return { tredsId: generateTredsId(), buyer: b.name, amount: randomAmount() };
          });
          setErpResults(rows);
          addLog('POST', '/api/v1/factoring-units/create', { batch: true, count, source: `erp-${erpSystem}` });
          setStage('erp_done');
        }, 1500);
      };

      const finalizeErp = () => {
        erpResults.forEach(r => {
          onUpload({
            id: r.tredsId, amount: r.amount, buyer: r.buyer, seller: 'My Company',
            status: 'Pending Buyer Approval', date: new Date().toISOString().split('T')[0],
            insuranceCover: null, bids: [], acceptedBid: null, settlementAdvice: null,
            tredsId: r.tredsId, tenor: 90, balanceTenor: 90,
            issueDate: new Date().toISOString().split('T')[0], gstnVerified: true, aiExtracted: true
          });
        });
        showToast({ title: `${erpResults.length} FUs synced`, detail: `From ${erpSystem.toUpperCase()}.` });
        close();
      };

      if (!open) return null;
      const inProgress = stage === 'ocr' || stage === 'gstn' || stage === 'creating' || stage === 'bulk_processing' || stage === 'erp_syncing';

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm"
          onClick={() => { if (!inProgress) close(); }}>
          <div className="bg-[#FDFCFB] border border-[#EAE6E1] rounded-sm w-full max-w-2xl max-h-[92vh] overflow-y-auto animate-in-fast" onClick={e => e.stopPropagation()}>

            {/* Header */}
            <div className="px-8 pt-7 pb-5 border-b border-[#EAE6E1] flex justify-between items-start">
              <div>
                <p className="text-[10px] uppercase tracking-[0.18em] text-[#928D86] font-semibold">Smart Invoice Intake</p>
                <h2 className="text-xl font-light tracking-tight text-[#1A1918] mt-1">
                  {stage === 'channel' ? 'Choose an intake channel' :
                   stage === 'file_idle' ? 'Upload invoice' :
                   stage === 'ocr' ? 'AI extracting fields…' :
                   stage === 'review' ? 'Review AI-extracted data' :
                   stage === 'gstn' ? 'Verifying with GSTN…' :
                   stage === 'fu_card' ? 'Factoring Unit ready' :
                   stage === 'creating' ? 'Creating FU…' :
                   stage === 'done' ? 'Factoring Unit created' :
                   stage === 'bulk_idle' ? 'Bulk upload (CSV / Excel)' :
                   stage === 'bulk_processing' ? 'Processing bulk file…' :
                   stage === 'bulk_done' ? `${bulkResults?.length || 0} invoices parsed` :
                   stage === 'erp_idle' ? 'ERP sync' :
                   stage === 'erp_syncing' ? `Syncing with ${erpSystem?.toUpperCase()}…` :
                   stage === 'erp_done' ? `${erpResults?.length || 0} invoices pulled` : ''}
                </h2>
              </div>
              {!inProgress && <button onClick={close} className="text-[#928D86] hover:text-[#1A1918]"><X size={18} /></button>}
            </div>

            {/* CHANNEL PICKER */}
            {stage === 'channel' && (
              <div className="p-8 space-y-3 animate-in-fast">
                <button onClick={startFileChannel}
                  className="w-full flex items-start gap-4 p-4 border border-[#EAE6E1] bg-[#FDFCFB] hover:border-[#1A1918] hover:bg-[#FBFAF7] rounded-sm text-left transition-all">
                  <div className="w-10 h-10 rounded-sm bg-[#F2EFEA] flex items-center justify-center flex-shrink-0"><FileText size={20} className="text-[#1A1918]" /></div>
                  <div className="flex-1">
                    <div className="flex items-center gap-2 mb-0.5">
                      <p className="text-sm font-semibold text-[#1A1918]">File Upload</p>
                      <span className="text-[8px] font-bold uppercase tracking-widest text-[#7A6A1E] bg-[#F2EDD5] px-1.5 py-0.5 rounded-sm flex items-center gap-0.5"><Sparkles size={8}/> OCR</span>
                    </div>
                    <p className="text-[11px] text-[#6B665F]">Drop a PDF or image. AI extracts the fields automatically.</p>
                  </div>
                  <ChevronRight size={16} className="text-[#928D86] mt-3" />
                </button>

                <button onClick={startBulkChannel}
                  className="w-full flex items-start gap-4 p-4 border border-[#EAE6E1] bg-[#FDFCFB] hover:border-[#1A1918] hover:bg-[#FBFAF7] rounded-sm text-left transition-all">
                  <div className="w-10 h-10 rounded-sm bg-[#F2EFEA] flex items-center justify-center flex-shrink-0"><FileSpreadsheet size={20} className="text-[#1A1918]" /></div>
                  <div className="flex-1">
                    <p className="text-sm font-semibold text-[#1A1918] mb-0.5">Bulk Upload</p>
                    <p className="text-[11px] text-[#6B665F]">CSV or Excel — import many invoices at once.</p>
                  </div>
                  <ChevronRight size={16} className="text-[#928D86] mt-3" />
                </button>

                <button onClick={startErpChannel}
                  className="w-full flex items-start gap-4 p-4 border border-[#EAE6E1] bg-[#FDFCFB] hover:border-[#1A1918] hover:bg-[#FBFAF7] rounded-sm text-left transition-all">
                  <div className="w-10 h-10 rounded-sm bg-[#F2EFEA] flex items-center justify-center flex-shrink-0"><Database size={20} className="text-[#1A1918]" /></div>
                  <div className="flex-1">
                    <p className="text-sm font-semibold text-[#1A1918] mb-0.5">ERP Sync</p>
                    <p className="text-[11px] text-[#6B665F]">Pull invoices live from Tally or SAP via authorized API.</p>
                  </div>
                  <ChevronRight size={16} className="text-[#928D86] mt-3" />
                </button>
              </div>
            )}

            {/* FILE: idle */}
            {stage === 'file_idle' && (
              <div className="p-8 space-y-4 animate-in-fast">
                <button onClick={() => { setStage('channel'); setFile(null); }} className="flex items-center gap-1 text-[10px] uppercase tracking-widest text-[#928D86] hover:text-[#1A1918] mb-2"><ChevronLeft size={12}/> Back</button>
                <div onDragOver={(e) => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={handleDrop} onClick={() => fileInputRef.current?.click()}
                  className={`border-2 border-dashed rounded-sm p-8 text-center cursor-pointer transition-all ${dragOver ? 'border-[#1A1918] bg-[#F2EFEA]' : 'border-[#EAE6E1] bg-[#F7F5F2] hover:border-[#D4CFC7]'}`}>
                  {file ? (
                    <div className="flex items-center justify-center gap-3">
                      <FileText size={28} className="text-[#1A1918]" />
                      <div className="text-left">
                        <p className="text-sm font-semibold text-[#1A1918]">{file.name}</p>
                        <p className="text-[10px] text-[#928D86] uppercase tracking-widest">{(file.size / 1024).toFixed(1)} kb · ready</p>
                      </div>
                    </div>
                  ) : (
                    <>
                      <Upload size={28} className="text-[#928D86] mx-auto mb-3" />
                      <p className="text-sm font-medium text-[#1A1918]">Drop invoice PDF or image here</p>
                      <p className="text-[10px] text-[#928D86] uppercase tracking-widest mt-1">or click to browse</p>
                    </>
                  )}
                  <input ref={fileInputRef} type="file" accept=".pdf,.png,.jpg,.jpeg" className="hidden" onChange={e => e.target.files[0] && setFile(e.target.files[0])} />
                </div>

                <div className="bg-[#FBF6EA] border border-[#E8DEC2] rounded-sm p-3 flex items-start gap-2">
                  <Sparkles size={14} className="text-[#7A6A1E] mt-0.5 flex-shrink-0" />
                  <p className="text-[11px] text-[#6B665F] leading-relaxed">AI/OCR will extract invoice number, date, amount, buyer GSTIN, commodity and HSN code in the next step.</p>
                </div>

                <button onClick={beginOcr} disabled={!file}
                  className={`w-full py-3 text-sm font-medium transition-colors ${file ? 'bg-[#1A1918] text-white hover:bg-black' : 'bg-[#EAE6E1] text-[#928D86] cursor-not-allowed'}`}>
                  Run OCR Extraction
                </button>
                <button onClick={() => { setFile(null); setOcrProgress(0); ocrDone.current = false; const buyer = MOCK_BUYERS[0]; setExt({ invoiceNumber: 'INV-2026-' + String(Math.floor(Math.random()*9000)+1000), invoiceDate: new Date().toISOString().split('T')[0], amount: String(randomAmount()), buyer: buyer.name, commodity: buyer.commodity, gstin: buyer.gstin, hsn: '8708' }); setStage('review'); addLog('POST', '/api/v1/ocr/extract', { mode: 'skip', mocked: true }); }}
                  className="w-full py-2 text-[10px] uppercase tracking-widest text-[#928D86] hover:text-[#1A1918]">Skip & enter manually</button>
              </div>
            )}

            {/* FILE: OCR processing */}
            {stage === 'ocr' && (
              <div className="p-10 animate-in-fast">
                <div className="relative w-full h-44 bg-[#F7F5F2] border border-[#EAE6E1] rounded-sm overflow-hidden mb-6">
                  {/* mock invoice doc */}
                  <div className="absolute inset-3 bg-[#FDFCFB] border border-[#EAE6E1] rounded-sm p-4">
                    <div className="space-y-1.5">
                      <div className="h-2 bg-[#EAE6E1] w-3/4 rounded-sm" />
                      <div className="h-2 bg-[#EAE6E1] w-1/2 rounded-sm" />
                      <div className="h-2 bg-[#F2EFEA] w-2/3 rounded-sm mt-2" />
                      <div className="h-2 bg-[#F2EFEA] w-1/3 rounded-sm" />
                      <div className="h-2 bg-[#F2EFEA] w-2/5 rounded-sm" />
                      <div className="h-2 bg-[#EAE6E1] w-3/5 rounded-sm mt-2" />
                    </div>
                  </div>
                  {/* scanline */}
                  <div className="absolute left-3 right-3 h-0.5 bg-[#1A1918] ocr-scanline shadow-[0_0_8px_rgba(26,25,24,0.4)]" />
                </div>
                <div className="text-center">
                  <div className="inline-flex items-center gap-2 text-[10px] uppercase tracking-[0.18em] text-[#7A6A1E] bg-[#F2EDD5] px-2 py-1 rounded-sm mb-3 font-bold">
                    <Cpu size={12} /> OCR Processing
                  </div>
                  <p className="text-sm font-medium text-[#1A1918]">Extracting structured fields from <span className="font-mono">{file?.name || 'invoice.pdf'}</span></p>
                  <div className="w-full h-1 bg-[#EAE6E1] rounded-full overflow-hidden mt-4 mb-2">
                    <div className="h-full bg-[#1A1918] transition-all duration-100" style={{ width: ocrProgress + '%' }} />
                  </div>
                  <p className="text-[10px] text-[#928D86] font-mono">POST /api/v1/ocr/extract · {Math.floor(ocrProgress)}%</p>
                </div>
              </div>
            )}

            {/* FILE: REVIEW */}
            {stage === 'review' && ext && (
              <div className="p-8 animate-in-fast">
                <div className="bg-[#FBF6EA] border border-[#E8DEC2] rounded-sm p-3 flex items-start gap-2 mb-5">
                  <Sparkles size={14} className="text-[#7A6A1E] mt-0.5 flex-shrink-0" />
                  <div>
                    <p className="text-xs font-semibold text-[#7A6A1E]">AI-extracted with 96% confidence</p>
                    <p className="text-[11px] text-[#6B665F] mt-0.5">Highlighted fields were auto-filled by OCR. Edit any field if needed.</p>
                  </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
                  <AiField label="Invoice No." value={ext.invoiceNumber} onChange={v => setExt({ ...ext, invoiceNumber: v })} mono />
                  <AiField label="Invoice Date" value={ext.invoiceDate} onChange={v => setExt({ ...ext, invoiceDate: v })} mono type="date" />
                  <AiField label="Amount" value={ext.amount} onChange={v => setExt({ ...ext, amount: v.replace(/[^0-9]/g, '') })} suffix="₹" mono />
                  <AiField label="Buyer" value={ext.buyer} onChange={v => setExt({ ...ext, buyer: v })} />
                  <AiField label="Commodity" value={ext.commodity} onChange={v => setExt({ ...ext, commodity: v })} />
                  <AiField label="Buyer GSTIN" value={ext.gstin} onChange={v => setExt({ ...ext, gstin: v })} mono />
                </div>

                <div className="flex gap-3">
                  <button onClick={() => setStage('file_idle')} className="px-4 py-3 text-sm font-medium text-[#1A1918] border border-[#EAE6E1] hover:bg-[#F7F5F2] transition-colors">Re-upload</button>
                  <button onClick={startGstn} className="flex-1 py-3 text-sm font-semibold bg-[#1A1918] text-white hover:bg-black transition-colors flex items-center justify-center gap-2">
                    Confirm & Verify with GSTN <ChevronRight size={14} />
                  </button>
                </div>
              </div>
            )}

            {/* FILE: GSTN */}
            {stage === 'gstn' && (
              <div className="p-12 text-center animate-in-fast">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[#E1F2E8] animate-shield-glow mb-5">
                  <ShieldCheck size={28} className="text-[#1E5D3F]" />
                </div>
                <p className="text-sm font-semibold text-[#1A1918] mb-1">Verifying with GSTN…</p>
                <p className="text-xs text-[#6B665F] mb-4">Authenticating invoice against the e-invoice registry</p>
                <p className="text-[10px] text-[#928D86] font-mono">GET /api/v1/gstn/validate-einvoice</p>
                <p className="text-[10px] text-[#928D86] mt-1 uppercase tracking-[0.18em]">Required for RBI 2026 Directions</p>
              </div>
            )}

            {/* FILE: FU CARD with declaration */}
            {stage === 'fu_card' && ext && fuData && (
              <div className="p-8 animate-in-fast">
                {/* GSTN badge */}
                <div className="flex items-center gap-2 mb-5">
                  <span className="inline-flex items-center gap-1.5 bg-[#E1F2E8] text-[#1E5D3F] text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-sm">
                    <BadgeCheck size={12} /> Genuine · GSTN Verified
                  </span>
                  <span className="text-[10px] text-[#928D86] uppercase tracking-widest">RBI 2026 compliant</span>
                </div>

                {/* FU Card */}
                <div className="border-2 border-[#1A1918] rounded-sm p-6 bg-[#FBFAF7] mb-5">
                  <div className="flex justify-between items-start mb-5 pb-4 border-b border-[#EAE6E1]">
                    <div>
                      <p className="text-[10px] uppercase tracking-[0.18em] text-[#928D86] font-bold">Factoring Unit</p>
                      <p className="text-base font-mono font-semibold text-[#1A1918] mt-1">{fuData.tredsId}</p>
                    </div>
                    <div className="text-right">
                      <p className="text-[10px] uppercase tracking-widest text-[#928D86]">Amount</p>
                      <p className="text-xl font-semibold text-[#1A1918] tabular-nums">{formatINR(parseInt(ext.amount) || 0)}</p>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-y-4 gap-x-6 text-xs">
                    <div><p className="text-[#928D86] mb-0.5 uppercase tracking-widest text-[10px]">Tenor</p><p className="font-semibold text-[#1A1918] tabular-nums">{fuData.tenor} days</p></div>
                    <div><p className="text-[#928D86] mb-0.5 uppercase tracking-widest text-[10px]">Balance Tenor</p><p className="font-semibold text-[#1A1918] tabular-nums">{fuData.balanceTenor} days</p></div>
                    <div><p className="text-[#928D86] mb-0.5 uppercase tracking-widest text-[10px]">Issue Date</p><p className="font-semibold text-[#1A1918] tabular-nums">{fuData.issueDate}</p></div>
                    <div><p className="text-[#928D86] mb-0.5 uppercase tracking-widest text-[10px]">Invoice Date</p><p className="font-semibold text-[#1A1918] tabular-nums">{ext.invoiceDate}</p></div>
                    <div><p className="text-[#928D86] mb-0.5 uppercase tracking-widest text-[10px]">Buyer</p><p className="font-semibold text-[#1A1918]">{ext.buyer}</p></div>
                    <div><p className="text-[#928D86] mb-0.5 uppercase tracking-widest text-[10px]">Buyer GSTIN</p><p className="font-mono font-semibold text-[#1A1918]">{ext.gstin}</p></div>
                    <div className="col-span-2"><p className="text-[#928D86] mb-0.5 uppercase tracking-widest text-[10px]">Commodity</p><p className="font-semibold text-[#1A1918]">{ext.commodity}</p></div>
                  </div>
                </div>

                {/* Negative Lien Declaration */}
                <div className={`border rounded-sm p-4 mb-4 transition-all ${declaration ? 'border-[#1A1918] bg-[#FBFAF7]' : 'border-[#EAE6E1] bg-[#FDFCFB]'}`}>
                  <div className="flex gap-3 items-start">
                    <Toggle checked={declaration} onChange={setDeclaration} />
                    <div className="flex-1">
                      <p className="text-[10px] uppercase tracking-widest text-[#928D86] font-bold mb-0.5">Digital Declaration · Negative Lien</p>
                      <p className="text-xs text-[#1A1918] leading-relaxed">I confirm no prior hypothecation or charge exists on this receivable with any working capital bank.</p>
                    </div>
                  </div>
                </div>

                <div className="flex gap-3">
                  <button onClick={() => setStage('review')} className="px-4 py-3 text-sm font-medium text-[#1A1918] border border-[#EAE6E1] hover:bg-[#F7F5F2] transition-colors">Back</button>
                  <button onClick={submitFU} disabled={!declaration}
                    className={`flex-1 py-3 text-sm font-semibold transition-colors flex items-center justify-center gap-2 ${declaration ? 'bg-[#1A1918] text-white hover:bg-black' : 'bg-[#EAE6E1] text-[#928D86] cursor-not-allowed'}`}>
                    Create Factoring Unit
                  </button>
                </div>
              </div>
            )}

            {/* CREATING */}
            {stage === 'creating' && (
              <div className="p-12 text-center animate-in-fast">
                <div className="w-3 h-3 rounded-full bg-[#1A1918] mx-auto animate-pulse-dot mb-4" />
                <p className="text-sm font-semibold text-[#1A1918]">Registering Factoring Unit…</p>
                <p className="text-[10px] text-[#928D86] mt-2 font-mono">POST /api/v1/factoring-units/create</p>
              </div>
            )}

            {/* DONE */}
            {stage === 'done' && fuData && (
              <div className="p-10 text-center animate-in-fast">
                <div className="w-16 h-16 rounded-full bg-[#E1F2E8] mx-auto mb-4 flex items-center justify-center animate-scale-in">
                  <Check size={32} className="text-[#1E5D3F]" strokeWidth={3} />
                </div>
                <p className="text-lg font-semibold text-[#1A1918]">Factoring Unit Created</p>
                <p className="text-xs text-[#6B665F] mt-1">{fuData.tredsId} · awaiting buyer approval</p>
                <button onClick={close} className="mt-6 px-6 py-2.5 bg-[#1A1918] text-white text-sm font-medium hover:bg-black transition-colors">Done</button>
              </div>

    // --- Bid Comparison Modal (unchanged) ---
    const BidComparisonModal = ({ invoice, open, onClose, onAcceptBid, addLog }) => {
      const [stage, setStage] = useState('comparing');
      const [pendingBidId, setPendingBidId] = useState(null);
      useEffect(() => { if (open) { setStage(invoice && invoice.status === 'Financed' && invoice.settlementAdvice ? 'done' : 'comparing'); setPendingBidId(null); } }, [open, invoice?.id]);
      if (!open || !invoice) return null;
      const sortedBids = [...(invoice.bids || [])].sort((a, b) => a.rate - b.rate);
      const bestBid = sortedBids[0];
      const handleAccept = (bid) => {
        setPendingBidId(bid.id); setStage('accepting');
        addLog('POST', `/api/v1/bids/${bid.id}/accept`, { invoice_id: invoice.id, amount: invoice.amount, bank: bid.bank, rate: bid.rate, tenor: bid.tenor || 90 });
        setTimeout(() => { onAcceptBid(invoice.id, bid); setStage('done'); }, 900);
      };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm" onClick={() => { if (stage !== 'accepting') onClose(); }}>
          <div className="bg-[#FDFCFB] border border-[#EAE6E1] rounded-sm w-full max-w-2xl max-h-[90vh] overflow-y-auto animate-in-fast" onClick={e => e.stopPropagation()}>
            <div className="px-8 py-6 border-b border-[#EAE6E1] flex justify-between items-start">
              <div>
                <p className="text-[10px] uppercase tracking-[0.18em] text-[#928D86] mb-1 font-semibold">Factoring Unit</p>
                <h2 className="text-xl font-light tracking-tight text-[#1A1918]">{invoice.tredsId || invoice.id} · {invoice.buyer}</h2>
                <p className="text-sm text-[#6B665F] mt-1">{formatINR(invoice.amount)} · invoice dated {invoice.date}</p>
              </div>
              {stage !== 'accepting' && <button onClick={onClose} className="text-[#928D86] hover:text-[#1A1918]"><X size={18} /></button>}
            </div>
            {stage === 'comparing' && (
              <div className="p-8">
                <div className="flex justify-between items-baseline mb-4"><p className="text-[10px] uppercase tracking-[0.18em] text-[#928D86] font-semibold">{sortedBids.length} active bids</p><p className="text-[10px] uppercase tracking-widest text-[#928D86]">Sorted by rate ascending</p></div>
                <div className="space-y-2 mb-6">
                  {sortedBids.map((bid, idx) => {
                    const isBest = idx === 0;
                    const fee = computeFee(invoice.amount, bid.rate, bid.tenor || 90);
                    const net = invoice.amount - fee;
                    return (
                      <div key={bid.id} className={`group border rounded-sm p-4 transition-all ${isBest ? 'border-[#1A1918] bg-[#FBFAF7]' : 'border-[#EAE6E1] bg-[#FDFCFB] hover:border-[#D4CFC7] hover:bg-[#FBFAF7]'}`}>
                        <div className="flex items-center justify-between gap-4">
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 mb-1">
                              <p className="text-sm font-semibold text-[#1A1918] truncate">{bid.bank}</p>
                              {isBest && <span className="text-[9px] font-bold uppercase tracking-widest bg-[#1A1918] text-white px-2 py-0.5 rounded-sm flex items-center gap-1"><Sparkles size={9}/> Best</span>}
                            </div>
                            <p className="text-[10px] text-[#928D86] font-mono">{bid.id} · valid {bid.validHours}h</p>
                          </div>
                          <div className="hidden sm:block"><p className="text-[9px] uppercase tracking-widest text-[#928D86]">Rate</p><p className={`text-lg font-semibold tabular-nums ${isBest ? 'text-[#1E5D3F]' : 'text-[#1A1918]'}`}>{bid.rate.toFixed(2)}%</p></div>
                          <div className="hidden md:block text-right"><p className="text-[9px] uppercase tracking-widest text-[#928D86]">Net to you</p><p className="text-sm font-semibold tabular-nums text-[#1A1918]">{formatINR(net)}</p><p className="text-[10px] text-[#928D86] tabular-nums">fee {formatINR(fee)}</p></div>
                          <button onClick={() => handleAccept(bid)} className={`text-[10px] font-bold px-3 py-1.5 rounded-sm transition-all flex-shrink-0 ${isBest ? 'bg-[#1A1918] text-white hover:bg-black hover:scale-105' : 'border border-[#1A1918] text-[#1A1918] hover:bg-[#1A1918] hover:text-white'}`}>ACCEPT</button>
                        </div>
                        <div className="sm:hidden mt-3 flex justify-between text-xs"><span className="text-[#6B665F]">{bid.rate.toFixed(2)}% · fee {formatINR(fee)}</span><span className="font-semibold text-[#1A1918]">{formatINR(net)}</span></div>
                      </div>
                    );
                  })}
                </div>
                {bestBid && <button onClick={() => handleAccept(bestBid)} className="w-full py-3 bg-[#1A1918] text-white text-sm font-semibold hover:bg-black transition-colors flex items-center justify-center gap-2"><Sparkles size={14}/> Accept Best Bid · {bestBid.bank} @ {bestBid.rate.toFixed(2)}%</button>}
              </div>
            )}
            {stage === 'accepting' && <div className="p-12 text-center"><div className="w-3 h-3 rounded-full bg-[#1A1918] mx-auto animate-pulse-dot mb-4" /><p className="text-sm font-semibold text-[#1A1918]">Locking in your bid…</p><p className="text-[10px] text-[#928D86] mt-2 font-mono">POST /api/v1/bids/{pendingBidId}/accept</p></div>}
            {stage === 'done' && invoice.settlementAdvice && (
              <div className="p-8">
                <div className="text-center mb-6">
                  <div className="w-16 h-16 rounded-full bg-[#E1F2E8] mx-auto mb-3 flex items-center justify-center animate-scale-in"><Check size={32} className="text-[#1E5D3F]" strokeWidth={3} /></div>
                  <p className="text-lg font-semibold text-[#1A1918]">Bid Accepted</p>
                  <p className="text-xs text-[#928D86] mt-1">Settlement advice has been generated.</p>
                </div>
                <div className="bg-[#FBFAF7] border border-[#EAE6E1] rounded-sm p-5">
                  <div className="flex justify-between items-center mb-4 pb-4 border-b border-[#EAE6E1]">
                    <div><p className="text-[10px] uppercase tracking-[0.18em] text-[#928D86] font-semibold">Settlement Advice</p><p className="text-sm font-mono font-semibold text-[#1A1918] mt-1">{invoice.settlementAdvice.id}</p></div>
                    <FileText size={20} className="text-[#928D86]" />
                  </div>
                  <div className="grid grid-cols-2 gap-y-3 gap-x-6 text-xs">
                    <div><p className="text-[#928D86] mb-0.5">Financier</p><p className="font-semibold text-[#1A1918]">{invoice.settlementAdvice.financier}</p></div>
                    <div><p className="text-[#928D86] mb-0.5">Discount Rate</p><p className="font-semibold text-[#1A1918] tabular-nums">{invoice.settlementAdvice.rate.toFixed(2)}% p.a.</p></div>
                    <div><p className="text-[#928D86] mb-0.5">Tenor</p><p className="font-semibold text-[#1A1918] tabular-nums">{invoice.settlementAdvice.tenor} days</p></div>
                    <div><p className="text-[#928D86] mb-0.5">Discount Fee</p><p className="font-semibold text-[#1A1918] tabular-nums">{formatINR(invoice.settlementAdvice.fee)}</p></div>
                    <div className="col-span-2 pt-3 border-t border-[#EAE6E1]"><p className="text-[#928D86] mb-0.5">Net Settlement</p><p className="text-2xl font-semibold text-[#1E5D3F] tabular-nums">{formatINR(invoice.settlementAdvice.net)}</p><p className="text-[10px] text-[#928D86] mt-1">Credited on {invoice.settlementAdvice.settlementDate} (T+1)</p></div>
                  </div>
                </div>
                <button onClick={onClose} className="w-full mt-6 py-3 border border-[#1A1918] text-[#1A1918] text-sm font-semibold hover:bg-[#1A1918] hover:text-white transition-colors">Done</button>
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- Main Application ---
    function ReceivaBridgePrototype() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentRole, setCurrentRole] = useState(null);
      const [userEmail, setUserEmail] = useState('');
      const [needsOnboarding, setNeedsOnboarding] = useState(false);

      const [invoices, setInvoices] = useState(INITIAL_INVOICES);
      const [logs, setLogs] = useState([]);
      const [isLogOpen, setIsLogOpen] = useState(false);
      const [activeTab, setActiveTab] = useState('Overview');

      const [showUploadModal, setShowUploadModal] = useState(false);
      const [bidInvoiceId, setBidInvoiceId] = useState(null);
      const [toasts, setToasts] = useState([]);

      const addLog = useCallback((method, endpoint, payload) => {
        setLogs(prev => [{ timestamp: new Date().toLocaleTimeString(), method, endpoint, payload }, ...prev].slice(0, 50));
      }, []);
      const showToast = useCallback((toast) => {
        const id = Date.now() + Math.random();
        setToasts(prev => [...prev, { id, ...toast }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
      }, []);

      const handleAuth = ({ persona, email, mode }) => {
        setIsAuthenticated(true); setCurrentRole(persona.role); setUserEmail(email);
        setNeedsOnboarding(mode === 'register' && persona.id === 'SELLER');
      };
      const handleLogout = () => {
        addLog('POST', '/api/v1/auth/logout', { email: userEmail, role: currentRole });
        setIsAuthenticated(false); setCurrentRole(null); setUserEmail('');
        setNeedsOnboarding(false); setActiveTab('Overview');
        setBidInvoiceId(null); setShowUploadModal(false);
      };

      const updateInvoiceStatus = (id, newStatus, extra = {}) => {
        setInvoices(prev => prev.map(inv => {
          if (inv.id !== id) return inv;
          let next = { ...inv, status: newStatus, ...extra };
          if (newStatus === 'In Auction' && (!next.bids || next.bids.length === 0)) next.bids = generateBids(id);
          return next;
        }));
        addLog('PATCH', `/api/v1/factoring-units/${id}`, { status: newStatus, ...extra });
      };

      const handleAcceptBid = (invoiceId, bid) => {
        const inv = invoices.find(i => i.id === invoiceId); if (!inv) return;
        const fee = Math.round(computeFee(inv.amount, bid.rate, bid.tenor || 90));
        const net = inv.amount - fee;
        const today = new Date(); const settlement = new Date(today); settlement.setDate(today.getDate() + 1);
        const advice = { id: `SA-${invoiceId}-${today.toISOString().split('T')[0].replace(/-/g, '')}`, financier: bid.bank, rate: bid.rate, tenor: bid.tenor || 90, fee, net, settlementDate: settlement.toISOString().split('T')[0] };
        setInvoices(prev => prev.map(i => i.id === invoiceId ? { ...i, status: 'Financed', acceptedBid: bid, settlementAdvice: advice } : i));
        showToast({ title: 'Bid Accepted Successfully', detail: `${bid.bank} @ ${bid.rate.toFixed(2)}% · net ${formatINR(net)}` });
      };
      const handleUploadInvoice = (newInvoice) => setInvoices(prev => [newInvoice, ...prev]);

      const stats = useMemo(() => {
        const financed = invoices.filter(i => i.status === 'Financed' && i.acceptedBid);
        const totalLiquidity = financed.reduce((sum, i) => sum + (i.amount - computeFee(i.amount, i.acceptedBid.rate, i.acceptedBid.tenor || 90)), 0);
        const avgRate = financed.length > 0 ? financed.reduce((s, i) => s + i.acceptedBid.rate, 0) / financed.length : null;
        const pending = invoices.filter(i => i.status !== 'Financed').length;
        return { totalLiquidity, avgRate, pending, financedCount: financed.length };
      }, [invoices]);

      const activeBidInvoice = invoices.find(i => i.id === bidInvoiceId) || null;

      if (!isAuthenticated) {
        return (
          <div className="min-h-screen bg-[#F7F5F2] text-[#1A1918] font-sans selection:bg-[#EAE6E1]">
            <LandingPage onAuth={handleAuth} addLog={addLog} />
            <ToastContainer toasts={toasts} />
            <ApiLogDrawer logs={logs} isOpen={isLogOpen} setIsOpen={setIsLogOpen} />
          </div>
        );
      }

      const isSeller = currentRole === ROLES.SELLER;

      return (
        <div className="min-h-screen bg-[#F7F5F2] text-[#1A1918] font-sans selection:bg-[#EAE6E1] pb-20">
          <nav className="h-16 bg-[#FDFCFB] border-b border-[#EAE6E1] flex items-center justify-between px-8 sticky top-0 z-30">
            <div className="flex items-center gap-8">
              <Logo size={26} />
              {!needsOnboarding && (
                <div className="flex gap-6 text-xs font-medium text-[#928D86] uppercase tracking-widest">
                  {['Overview', 'Marketplace', 'Settlements', 'Audit'].map(tab => (
                    <button key={tab} onClick={() => setActiveTab(tab)} className={`${activeTab === tab ? 'text-[#1A1918] border-b-2 border-[#1A1918]' : ''} pb-1 transition-all`}>{tab}</button>
                  ))}
                </div>
              )}
            </div>
            <div className="flex items-center gap-4">
              <div className="hidden md:flex items-center gap-2 px-3 py-1.5 bg-[#F7F5F2] border border-[#EAE6E1] rounded-sm">
                <div className="w-1.5 h-1.5 rounded-full bg-[#1E5D3F]" />
                <span className="text-[10px] font-bold uppercase tracking-widest text-[#1A1918]">{currentRole}</span>
              </div>
              <ProfileMenu email={userEmail} role={currentRole} onLogout={handleLogout} />
            </div>
          </nav>

          <main className="p-8 max-w-7xl mx-auto">
            {needsOnboarding ? (
              <KycLightWizard userEmail={userEmail} addLog={addLog} showToast={showToast} onComplete={() => setNeedsOnboarding(false)} onTriggerUpload={() => setShowUploadModal(true)} />
            ) : (
              <div className="space-y-8 animate-in">
                <div className="flex justify-between items-end">
                  <div>
                    <h1 className="text-3xl font-light tracking-tight">{currentRole} Dashboard</h1>
                    <p className="text-sm text-[#928D86] mt-1">Operational view for {new Date().toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })}</p>
                  </div>
                  {isSeller && (
                    <button onClick={() => setShowUploadModal(true)} className="bg-[#1A1918] text-white px-4 py-2 text-xs font-semibold rounded-sm flex items-center gap-2 hover:bg-black transition-colors">
                      <Plus size={16} /> NEW INVOICE
                    </button>
                  )}
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  <StatCard title="Total Liquidity" accent value={formatLiquidity(stats.totalLiquidity)} subtext={stats.financedCount > 0 ? `Across ${stats.financedCount} financed unit${stats.financedCount === 1 ? '' : 's'}` : 'No financed units yet'} />
                  <StatCard title="Avg. Discount Rate" value={stats.avgRate !== null ? stats.avgRate.toFixed(2) + '%' : '—'} subtext={stats.avgRate !== null ? 'Weighted across accepted bids' : 'Awaiting first acceptance'} />
                  <StatCard title="Pending FUs" value={stats.pending} subtext={stats.pending > 0 ? 'Requires immediate action' : 'All clear'} />
                </div>

                <div className="bg-[#FDFCFB] border border-[#EAE6E1] rounded-sm">
                  <div className="px-6 py-4 border-b border-[#EAE6E1] flex justify-between items-center">
                    <h3 className="text-xs font-bold uppercase tracking-widest">Factoring Unit Registry</h3>
                    <div className="relative">
                      <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-[#928D86]" />
                      <input className="bg-[#F7F5F2] border border-[#EAE6E1] rounded-sm pl-8 pr-4 py-1.5 text-xs w-64 focus:outline-none" placeholder="Search by Invoice ID or Entity" />
                    </div>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full text-left">
                      <thead>
                        <tr className="text-[10px] uppercase text-[#928D86] tracking-tighter border-b border-[#EAE6E1]">
                          <th className="px-6 py-4 font-semibold">ID</th>
                          <th className="px-6 py-4 font-semibold">Entity Details</th>
                          <th className="px-6 py-4 font-semibold">Amount</th>
                          <th className="px-6 py-4 font-semibold">Status</th>
                          <th className="px-6 py-4 font-semibold text-right">Actions</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-[#F2EFEA]">
                        {invoices.map(inv => {
                          const sellerCanViewBids = isSeller && inv.status === 'In Auction' && inv.bids && inv.bids.length > 0;
                          const bestRate = sellerCanViewBids ? Math.min(...inv.bids.map(b => b.rate)) : null;
                          return (
                            <tr key={inv.id} onClick={() => sellerCanViewBids && setBidInvoiceId(inv.id)} className={`hover:bg-[#FBFAF7] transition-colors group ${sellerCanViewBids ? 'cursor-pointer' : ''}`}>
                              <td className="px-6 py-5 text-xs font-mono font-medium">
                                {inv.id}
                                {inv.gstnVerified && <span className="ml-2 inline-flex items-center gap-0.5 text-[8px] font-bold uppercase tracking-widest text-[#1E5D3F] bg-[#E1F2E8] px-1.5 py-0.5 rounded-sm align-middle"><BadgeCheck size={8}/> GSTN</span>}
                              </td>
                              <td className="px-6 py-5">
                                <p className="text-xs font-semibold">{inv.buyer}</p>
                                <p className="text-[10px] text-[#928D86]">Seller: {inv.seller}</p>
                              </td>
                              <td className="px-6 py-5"><p className="text-sm font-semibold text-[#1A1918]">{formatINR(inv.amount)}</p></td>
                              <td className="px-6 py-5">
                                <span className={`text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-tighter ${inv.status === 'Financed' ? 'bg-[#E1F2E8] text-[#1E5D3F]' : inv.status === 'In Auction' ? 'bg-[#F2EDD5] text-[#7A6A1E]' : 'bg-[#F2EFEA] text-[#6B665F]'}`}>{inv.status}</span>
                              </td>
                              <td className="px-6 py-5 text-right">
                                {sellerCanViewBids && (
                                  <button onClick={(e) => { e.stopPropagation(); setBidInvoiceId(inv.id); }} className="text-[10px] font-bold bg-[#1A1918] text-white px-3 py-1.5 rounded-sm flex items-center gap-1.5 ml-auto hover:bg-black transition-colors">
                                    {inv.bids.length} BIDS · BEST {bestRate.toFixed(2)}%<ChevronRight size={11} />
                                  </button>
                                )}
                                {isSeller && inv.status === 'Pending Buyer Approval' && (
                                  <span className="text-[10px] text-[#928D86] flex items-center justify-end gap-1"><span className="w-1.5 h-1.5 rounded-full bg-[#E6B325]" /> Awaiting buyer</span>
                                )}
                                {currentRole === ROLES.BUYER && inv.status === 'Pending Buyer Approval' && (
                                  <button onClick={(e) => { e.stopPropagation(); updateInvoiceStatus(inv.id, 'In Auction'); showToast({ title: 'Approved for auction', detail: `${inv.id} is live` }); }} className="text-[10px] font-bold bg-[#1A1918] text-white px-3 py-1 rounded-sm">APPROVE FOR TREDS</button>
                                )}
                                {currentRole === ROLES.FINANCIER && inv.status === 'In Auction' && (
                                  <div className="flex justify-end gap-2">
                                    <span className="text-[10px] flex items-center gap-1 text-[#928D86] mr-2"><ShieldCheck size={12} className={inv.insuranceCover ? 'text-green-600' : ''} />{inv.insuranceCover ? 'Insured' : 'No Cover'}</span>
                                    <button onClick={(e) => { e.stopPropagation(); const myBid = { id: 'BID-FIN-' + Date.now(), bank: 'My Bank', rate: 7.5, tenor: 90 }; setInvoices(prev => prev.map(i => i.id === inv.id ? { ...i, bids: [...(i.bids || []), myBid] } : i)); addLog('POST', `/api/v1/factoring-units/${inv.id}/bids`, { bank: 'My Bank', rate: 7.5 }); showToast({ title: 'Bid placed', detail: `${inv.id} @ 7.50%` }); }} className="text-[10px] font-bold bg-[#1A1918] text-white px-3 py-1 rounded-sm hover:scale-105 transition-transform">BID @ 7.5%</button>
                                  </div>
                                )}
                                {currentRole === ROLES.INSURANCE && inv.status === 'In Auction' && !inv.insuranceCover && (
                                  <button onClick={(e) => { e.stopPropagation(); updateInvoiceStatus(inv.id, 'In Auction', { insuranceCover: 100 }); showToast({ title: 'Cover offered', detail: `${inv.id} now insured` }); }} className="text-[10px] font-bold bg-[#E6B325] text-white px-3 py-1 rounded-sm">OFFER CREDIT COVER</button>
                                )}
                                {inv.status === 'Financed' && !sellerCanViewBids && (
                                  <div className="flex justify-end items-center text-green-600 gap-1 text-[10px] font-bold"><CheckCircle2 size={14} /> SETTLED</div>
                                )}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            )}
          </main>

          <UploadInvoiceModal open={showUploadModal} onClose={() => setShowUploadModal(false)} onUpload={handleUploadInvoice} addLog={addLog} showToast={showToast} />
          <BidComparisonModal invoice={activeBidInvoice} open={!!bidInvoiceId} onClose={() => setBidInvoiceId(null)} onAcceptBid={handleAcceptBid} addLog={addLog} />
          <ToastContainer toasts={toasts} />
          <ApiLogDrawer logs={logs} isOpen={isLogOpen} setIsOpen={setIsLogOpen} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ReceivaBridgePrototype />);
  </script>
</body>
</html>
